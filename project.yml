name: Kukkiri
options:
  bundleIdPrefix: app.kukkiri
  deploymentTarget:
    iOS: "16.0"
  defaultConfig: Release

configs:
  Debug: debug
  Release: release

targets:
  Kukkiri:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Kukkiri
        excludes:
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.kukkiri.upscaler.ios
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: Kukkiri/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        DEVELOPMENT_TEAM: 83VGKGSQUH
        CODE_SIGN_STYLE: Automatic
