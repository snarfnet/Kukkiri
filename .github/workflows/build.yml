name: Build and Upload to TestFlight

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: |
        XCODE_APP=$(ls /Applications/ | grep -E "^Xcode_2[6-9]|^Xcode_[3-9][0-9]" | sort -V | tail -1)
        if [ -n "$XCODE_APP" ]; then
          sudo xcode-select -s "/Applications/$XCODE_APP"
        else
          XCODE_APP=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          sudo xcode-select -s "/Applications/$XCODE_APP"
        fi
        xcodebuild -version

    - name: Install tools
      run: |
        brew install xcodegen
        pip3 install --break-system-packages gdown || pip3 install gdown

    - name: Download Core ML model
      run: |
        python3 -m gdown 16JEWh48fgQc8az7avROePOd-PYda0Yi2 -O Kukkiri/realesrgan4x.mlmodel
        ls -la Kukkiri/realesrgan4x.mlmodel

    - name: Set build number
      run: |
        BUILD_NUM=$(( ${{ github.run_number }} + 0 ))
        sed -i "" "s/CURRENT_PROJECT_VERSION: [0-9]*/CURRENT_PROJECT_VERSION: $BUILD_NUM/" project.yml
        echo "Build number: $BUILD_NUM"

    - name: Generate Xcode project
      run: xcodegen generate

    - name: Set up ASC API Key
      env:
        ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
      run: |
        mkdir -p ~/.appstoreconnect/private_keys
        echo "$ASC_API_KEY_CONTENT" | base64 -D > ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8

    - name: Build Archive
      run: |
        xcodebuild archive \
          -scheme Kukkiri \
          -configuration Release \
          -destination "generic/platform=iOS" \
          -archivePath build/Kukkiri.xcarchive \
          CODE_SIGN_STYLE=Automatic \
          DEVELOPMENT_TEAM=83VGKGSQUH \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 \
          -authenticationKeyID WDXGY9WX55 \
          -authenticationKeyIssuerID 2be0734f-943a-4d61-9dc9-5d9045c46fec

    - name: Export IPA
      run: |
        xcodebuild -exportArchive \
          -archivePath build/Kukkiri.xcarchive \
          -exportPath build/export \
          -exportOptionsPlist export_options.plist \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 \
          -authenticationKeyID WDXGY9WX55 \
          -authenticationKeyIssuerID 2be0734f-943a-4d61-9dc9-5d9045c46fec
        ls -la build/export/*.ipa

    - name: Upload to TestFlight
      run: |
        set -o pipefail
        xcrun altool --upload-app \
          -f build/export/Kukkiri.ipa \
          -t ios \
          --apiKey WDXGY9WX55 \
          --apiIssuer 2be0734f-943a-4d61-9dc9-5d9045c46fec \
          --verbose 2>&1 | tee altool.log
        if grep -q "ERROR" altool.log; then
          echo "::error::altool reported an error during upload"
          exit 1
        fi
